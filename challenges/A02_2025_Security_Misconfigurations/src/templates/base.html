<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediNexus | Patient Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .sidebar { min-height: 100vh; background: #0d6efd; color: white; }
        .sidebar a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 10px 15px; display: block; border-radius: 5px; margin-bottom: 5px;}
        .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.2); color: white; }
        .main-content { padding: 30px; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-3">
                <h4 class="mb-4"><i class="bi bi-hospital"></i> MediNexus</h4>
                <nav>
                    <a href="/portal/dashboard" class="{{ 'active' if page == 'dashboard' else '' }}"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    <a href="/portal/appointments" class="{{ 'active' if page == 'appointments' else '' }}"><i class="bi bi-calendar-event"></i> Appointments</a>
                    <a href="/portal/labs" class="{{ 'active' if page == 'labs' else '' }}"><i class="bi bi-file-earmark-medical"></i> Lab Results</a>
                    <a href="/portal/directory" class="{{ 'active' if page == 'directory' else '' }}"><i class="bi bi-people"></i> Find a Doctor</a>
                    <hr>
                    <a href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
                </nav>
            </div>
            <div class="col-md-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>{{ page|capitalize }}</h3>
                    <div class="user-profile">
                        <i class="bi bi-person-circle"></i> {{ session.name }}
                    </div>
                </div>
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
