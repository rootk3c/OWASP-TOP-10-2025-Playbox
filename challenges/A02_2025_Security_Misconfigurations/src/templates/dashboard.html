{% extends "layout.html" %}
{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>Welcome, {{ name }}</h2>
        <hr>
        <div class="card mb-4">
            <div class="card-header">
                My Health Records
            </div>
            <div class="card-body">
                <div id="loading" class="text-center">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p>Fetching secure records...</p>
                </div>
                <div id="records-container" style="display:none;">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>NHS Number</th>
                                <th>Condition</th>
                                <th>Clinical Notes</th>
                            </tr>
                        </thead>
                        <tbody id="records-body">
                            </tbody>
                    </table>
                </div>
                <div id="error-msg" class="alert alert-danger" style="display:none;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // The secure application requests ONLY the current user's data
        const currentUserId = "{{ user_id }}";
        const apiUrl = `/_api/patients?filter=id eq '${currentUserId}'`;

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error("Failed to fetch records");
                return response.json();
            })
            .then(data => {
                const tbody = document.getElementById('records-body');
                if (data.value && data.value.length > 0) {
                    data.value.forEach(record => {
                        const row = `<tr>
                            <td>${record.nhs_number}</td>
                            <td>${record.condition}</td>
                            <td>${record.notes}</td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                } else {
                    tbody.innerHTML = "<tr><td colspan='3'>No records found.</td></tr>";
                }
                document.getElementById('loading').style.display = 'none';
                document.getElementById('records-container').style.display = 'block';
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error-msg').innerText = "Error loading data. Please contact IT support.";
                document.getElementById('error-msg').style.display = 'block';
            });
    });
</script>
{% endblock %}
