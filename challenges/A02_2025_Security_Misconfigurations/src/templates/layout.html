<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NHS MediLog Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .nhs-blue { background-color: #005eb8; color: white; }
        .navbar-brand { font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg nhs-blue">
        <div class="container">
            <a class="navbar-brand text-white" href="#">NHS Secure Portal</a>
            <div class="d-flex">
                {% if session.get('user_id') %}
                <a href="/logout" class="btn btn-outline-light btn-sm">Sign Out</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
