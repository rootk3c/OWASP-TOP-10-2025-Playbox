<!DOCTYPE html>
<html>
<head>
    <title>Enterprise Status Checker</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">
    <h1>Is It Down?</h1>
    <p>Enter a URL to check its status safely.</p>
    <form action="/check" method="POST">
        <input type="text" name="url" placeholder="http://example.com" required style="padding: 10px; width: 300px;">
        <button type="submit" style="padding: 10px;">Check Status</button>
    </form>
</body>
</html>
