<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project SPARSH - Secure Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; border-top: 6px solid #2c3e50; }
        .logo { font-size: 24px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
        .subtitle { color: #7f8c8d; font-size: 14px; margin-bottom: 30px; }
        input[type="text"], input[type="password"] { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; }
        button { width: 90%; padding: 12px; background-color: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; }
        button:hover { background-color: #3498db; }
        .error { color: #e74c3c; font-size: 0.9em; margin-bottom: 15px; background: #fadbd8; padding: 10px; border-radius: 4px; }
        .notice { font-size: 0.8em; color: #95a5a6; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">Project Sparsh</div>
        <div class="subtitle">Government Pension Portal (v2.1)</div>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Authenticate</button>
        </form>
        
        <div class="notice">Public demonstration access provided using credentials: demo / demo123</div>
    </div>
</body>
</html>
