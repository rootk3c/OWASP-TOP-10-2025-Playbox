<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOVEit Upload</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>MOVEit Secure File Transfer</h1>
        <nav>
            <a href="/login.html">Login</a> | 
            <a href="/upload.html">Upload</a> | 
            <a href="/guest.html">Guest Access</a>
        </nav>
    </header>
    <section>
        <h2>Upload File</h2>
        <form action="/upload.aspx" method="POST" enctype="multipart/form-data">
            <label for="file">Choose file:</label>
            <input type="file" id="file" name="file" required>
            <button type="submit">Upload File</button>
        </form>
        <p style="margin-top: 15px; font-size: 0.9em; color: #666; text-align: center;">
            All files are uploaded under the guest account.
        </p>
    </section>
    <footer>© Simulated MOVEit Transfer</footer>
</body>
</html>
