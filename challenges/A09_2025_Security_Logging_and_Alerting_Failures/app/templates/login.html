<!DOCTYPE html>
<html>
<head>
    <title>Login - Iron-Sight</title>
    <style>
        body { background-color: #111; color: #0f0; font-family: monospace; text-align: center; margin-top: 50px; }
        input { background: #222; color: #0f0; border: 1px solid #0f0; padding: 5px; margin: 5px; }
        button { background: #0f0; color: #111; border: none; padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Vendor Authentication</h2>
    {% if error %}<p style="color:red">{{ error }}</p>{% endif %}
    {% if msg %}<p style="color:yellow">{{ msg }}</p>{% endif %}
    
    <form method="POST" action="/login">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
    
    <br><br>
    <form method="POST" action="/forgot_password" style="border-top: 1px dashed #0f0; padding-top: 20px; width: 300px; margin: 0 auto;">
        <p>Emergency Vendor Access Recovery</p>
        <input type="text" name="username" placeholder="Username" required><br>
        <button type="submit">Send PGP Reset Link</button>
    </form>
</body>
</html>
